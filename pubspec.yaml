name: stock_market_roi_app
description: "Stock Market ROI — US market data, portfolio tracker, crypto and analysis."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # Auth + database
  supabase_flutter: ^2.8.4

  # Avatar photo picking
  image_picker: ^1.1.2

  # App version for the Settings → About row
  package_info_plus: ^8.1.1

  # Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  # HTTP client
  dio: ^5.8.0+1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Charts
  fl_chart: ^0.70.2

  # Images
  cached_network_image: ^3.4.1

  # Blog / markdown
  flutter_markdown: ^0.7.6

  # In-app WebView
  webview_flutter: ^4.10.0

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  web_socket_channel: ^2.4.0

  cupertino_icons: ^1.0.8
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - shorebird.yaml

# App launcher icon — green trending-up arrow on black (matches stockmarketroi.com favicon)
flutter_launcher_icons:
  image_path: "assets/branding/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#09090b"
  adaptive_icon_foreground: "assets/branding/icon_foreground.png"
